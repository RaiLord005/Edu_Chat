<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDU_CHAT - Register</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='auth-style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Animated Background Elements -->
    <div class="auth-bg-elements">
        <div class="floating-icon"><i class="fas fa-book-open"></i></div>
        <div class="floating-icon"><i class="fas fa-lightbulb"></i></div>
        <div class="floating-icon"><i class="fas fa-graduation-cap"></i></div>
        <div class="floating-icon"><i class="fas fa-flask"></i></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">
                    <i class="fas fa-book"></i>
                </div>
                <h1>EDU_CHAT</h1>
                <p>Join Your Study Community</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Create Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="Choose a unique username" 
                            required
                            minlength="3"
                            maxlength="50"
                        >
                    </div>
                    <small class="form-hint">3-50 characters, alphanumeric and underscore only</small>
                    <small class="error-message" id="usernameError"></small>
                </div>

                <div class="form-group">
                    <label for="password">Create Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Create a strong password" 
                            required
                            minlength="6"
                        >
                        <!-- <button type="button" class="toggle-password" onclick="togglePassword(event,'password')">
                            <i class="fas fa-eye"></i>
                        </button> -->
                    </div>
                    <small class="form-hint">Minimum 6 characters</small>
                    <small class="error-message" id="passwordError"></small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Re-enter your password" 
                            required
                        >
                        <!-- <button type="button" class="toggle-password" onclick="togglePassword(event,'confirmPassword')">
                            <i class="fas fa-eye"></i>
                        </button> -->
                    </div>
                    <small class="error-message" id="confirmPasswordError"></small>
                </div>

                <button type="submit" class="btn-auth">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>

                <div class="error-box" id="formError"></div>
                <div class="success-box" id="formSuccess"></div>
            </form>

            <div class="auth-footer">
                <p>Already have an account? 
                    <a href="/login">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // event passed from inline handler so global "event" not required
        function togglePassword(evt, fieldId) {
            const field = document.getElementById(fieldId);
            const btn = evt.target.closest('.toggle-password');
            if (field.type === 'password') {
                field.type = 'text';
                btn.innerHTML = '<i class="fas fa-eye-slash"></i>';
            } else {
                field.type = 'password';
                btn.innerHTML = '<i class="fas fa-eye"></i>';
            }
        }

        function validateUsername(username) {
            // Only alphanumeric and underscore
            return /^[a-zA-Z0-9_]{3,50}$/.test(username);
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Clear previous errors/messages
            document.getElementById('usernameError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            document.getElementById('confirmPasswordError').textContent = '';
            document.getElementById('formError').textContent = '';
            document.getElementById('formSuccess').textContent = '';
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validation
            let hasError = false;
            
            if (!username || username.length < 3) {
                document.getElementById('usernameError').textContent = 
                    'Username must be at least 3 characters';
                hasError = true;
            } else if (!validateUsername(username)) {
                document.getElementById('usernameError').textContent = 
                    'Username can only contain letters, numbers, and underscores';
                hasError = true;
            }
            
            if (!password || password.length < 6) {
                document.getElementById('passwordError').textContent = 
                    'Password must be at least 6 characters';
                hasError = true;
            }
            
            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = 
                    'Passwords do not match';
                hasError = true;
            }
            
            if (hasError) return;
            
            const btn = this.querySelector('button[type="submit"]');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('formSuccess').textContent = 
                        '✓ Account created successfully! Your User ID: ' + data.user_id + '. Redirecting to login...';
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    document.getElementById('formError').textContent = 
                        data.error || 'Registration failed. Please try again.';
                }
            } catch (error) {
                console.error('Registration error:', error);
                document.getElementById('formError').textContent = 
                    'An error occurred. Please try again.';
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        });
        
        // Check if already logged in
        window.addEventListener('load', function() {
            if (sessionStorage.getItem('userId')) {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
